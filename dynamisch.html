<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Dynamische-Datenseite</title>
</head>
<body>

  <!-- 5.1 Leere Liste für Stadtteile -->
  <ul id="liste-linz"></ul>

  <!-- 5.3 Leere Liste für Serverdaten -->
  <ul id="service-linz"></ul>

  <!-- JavaScript 5.a. -->
  <script>
    // Lokale Daten
    const stadtteile = ["Urfahr", "Innere Stadt", "Bindermichel"];

    // 5.2: Eigene Namen ergänzen
    stadtteile.push("DEIN NAME");
    stadtteile.push("NAME DEINER MUTTER");

    const liste = document.getElementById("liste-linz");
    stadtteile.forEach(s => {
      let li = document.createElement("li");
      li.textContent = s;
      liste.appendChild(li);
    });
  </script>

  <!-- JavaScript 5.d. -->
  <script>
    // Daten vom Server laden (Servicecall)
    fetch('https://jsonplaceholder.typicode.com/users')
      .then(response => response.json())
      .then(data => {
        const sListe = document.getElementById("service-linz");
        data.forEach(user => {
          let li = document.createElement("li");
          li.textContent = "User: " + user.name;
          sListe.appendChild(li);
        });
      });
  </script>

</body>
</html>
